name: FMM Football Match Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore notification state cache
        uses: actions/cache/restore@v4
        with:
          path: notification_state.json
          key: fmm-notification-state-${{ github.run_id }}
          restore-keys: fmm-notification-state

      - name: Run FMM monitor
        env:
          GENIUS_API_KEY: ${{ secrets.GENIUS_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python databricks_job.py

      - name: Save notification state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: notification_state.json
          key: fmm-notification-state-${{ github.run_id }}

      - name: Upload Excel as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmm-output
          path: football_competitions_fetch.xlsx
          retention-days: 7
